<script>
  function formatNum(num){
  return num.toLocaleString("en-US");
}
  
  const echoTopup = { 66: 60, 203: 185, 335: 305, 759: 690 };
  const prices = { 66: 30, 203: 90, 335: 145, 759: 285 };

  function generateOptions(mode, target) {
    let options = [];
    let maxBig = 0;

    if (mode === "budget") {
      maxBig = Math.floor(target / prices[759]) + 5;
    } else if (mode === "buttons") {
      maxBig = Math.floor(target / 759) + 5;
    } else if (mode === "topup") {
      maxBig = Math.floor(target / echoTopup[759]) + 5;
    }

    for (let c66=0;c66<=2;c66++) {
      for (let c203=0;c203<=2;c203++) {
        for (let c335=0;c335<=1;c335++) {
          for (let c759=0;c759<=maxBig;c759++) {

            let echoes = c66*66 + c203*203 + c335*335 + c759*759;
let topup = c66*echoTopup[66] + c203*echoTopup[203] + c335*echoTopup[335] + c759*echoTopup[759];

// ส่วนลดแพ็กใหญ่
let price759 = prices[759];
if (c759 >= 30) {
  price759 = 280;
} else if (c759 >= 20) {
  price759 = 283;
}

let price = c66*prices[66] + c203*prices[203] + c335*prices[335] + c759*price759;

// กันสูตรว่าง
let desc = `${c759>0?`759x${c759} `:""}${c335>0?`335x${c335} `:""}${c203>0?`203x${c203} `:""}${c66>0?`66x${c66}`:""}`.trim();
if (!desc) continue;

// ==========================
// 🎯 1. ถ้าแพ็กเล็ก "พอดีเป๊ะ"
// ==========================
let isExactSmallPack = (echoes === target && c759 === 0);

if (isExactSmallPack) {
  options.push({desc, echoes, topup, price});
  continue;
}

// ==========================
// 🚫 2. กัน spam แพ็กเล็ก (แก้แล้ว)
let smallCount = c66 + c203 + c335;

// อนุญาตให้ใช้ 3 แพ็ก ถ้ามัน "ถึง target"
if (smallCount >= 3 && c759 === 0 && echoes < target) continue;

// ==========================
// 💰 3. กรองความคุ้ม (แก้แล้ว)
let value = echoes / price;
let baseValue = 759 / price759;

// อนุญาตสูตรที่ "ใกล้ target"
let isNearTarget = echoes >= target && echoes <= target + 10;

if (!isNearTarget && value < baseValue * 0.95) continue;

// ==========================
// ✅ 4. เงื่อนไข mode เดิม
// ==========================
if (mode==="buttons" && echoes>=target) options.push({desc,echoes,topup,price});
if (mode==="topup" && topup>=target) options.push({desc,echoes,topup,price});
if (mode==="budget") options.push({desc,echoes,topup,price});
            
          }
        }
      }
    }
    return options;
  }

  function findBetterOption(options, best, maxExtra = 10){

  let candidates = options.filter(o =>
    o.price > best.price &&
    o.price <= best.price + maxExtra &&
    o.echoes > best.echoes
  );

  if(candidates.length === 0) return null;

  // เลือกตัวที่คุ้มสุด (echoes ต่อบาท)
  candidates.sort((a,b)=>
    (b.echoes/b.price) - (a.echoes/a.price)
  );

  return candidates[0];
}

function calculateButtons() {
  let needed = parseInt(document.getElementById("echoesInput").value);

  if (isNaN(needed) || needed <= 0) {
    document.getElementById("result").innerText = "กรุณากรอกจำนวนกระดุมที่ถูกต้อง";
    return;
  }

  let options = generateOptions("buttons", needed).filter(o=>o.echoes>=needed);
  options.sort((a,b)=>a.price-b.price);

  let best = options[0];
  let better = findBetterOption(options, best, 10);

  let html = `
  <p>💡 สูตรที่เลือก: ${best.desc}</p>
  <p>🔴 รวมทั้งหมด: ${formatNum(best.echoes)} กระดุม</p>
  <p>💸 ราคารวม: ${formatNum(best.price)} บาท</p>
  <p>🔊 ยอดเติมเสียงสะท้อนรวม: ${formatNum(best.topup)}</p>
  `;

  if(better){
    html += `
    <hr>
    <p style="color:#ff4fa3;font-weight:600;">
    🔥 เพิ่มเงินอีก ${better.price - best.price} บาท  
    เพื่อได้ +${better.echoes - best.echoes} echoes
    </p>

    <p>✨ สูตรแนะนำ: ${better.desc}</p>
    <p>🔴 รวมทั้งหมด: ${formatNum(better.echoes)} กระดุม</p>
    <p>💸 ราคารวม: ${formatNum(better.price)} บาท</p>
    <p>🔊 ยอดเติมเสียงสะท้อนรวม: ${formatNum(better.topup)}</p>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

function calculateTopup() {
  let neededTopup = parseInt(document.getElementById("echoesInput").value);
  if (isNaN(neededTopup) || neededTopup <= 0) {
    document.getElementById("result").innerText = "กรุณากรอกยอดเติมเสียงสะท้อนที่ถูกต้อง";
    return;
  }

  let options = generateOptions("topup", neededTopup)
                  .filter(o=>o.topup>=neededTopup);

  options.sort((a,b)=>a.price-b.price);

  let best = options[0];

  // 🔥 เพิ่มตรงนี้
  let better = findBetterOption(options, best, 10);

  let html = `
  <p>💡 สูตรที่เลือก: ${best.desc}</p>
  <p>🔴 รวมทั้งหมด: ${formatNum(best.echoes)} กระดุม</p>
  <p>💸 ราคารวม: ${formatNum(best.price)} บาท</p>
  <p>🔊 ยอดเติมเสียงสะท้อนรวม: ${formatNum(best.topup)}</p>
  `;

  if(better){
    let diffPrice = better.price - best.price;
    let diffEcho = better.echoes - best.echoes;

    html += `
    <hr>
    <p style="color:#ff4fa3;font-weight:600;">
    🔥 เพิ่มเงินอีก ${diffPrice} บาท  
    เพื่อได้ +${diffEcho} echoes
    </p>

    <p>✨ สูตรแนะนำ: ${better.desc}</p>
    <p>🔴 รวมทั้งหมด: ${formatNum(better.echoes)} กระดุม</p>
    <p>💸 ราคารวม: ${formatNum(better.price)} บาท</p>
    <p>🔊 ยอดเติมเสียงสะท้อนรวม: ${formatNum(better.topup)}</p>
    `;
  }

// ฟังก์ชันคำนวณโหมดส่วนลด (ใช้เฉพาะ preorderDiscount)
function calculateDiscount() {
  let rows = document.querySelectorAll("#discountRows tr");
  let results = [];

  rows.forEach(r=>{
    let pack = r.children[0].querySelector("select").value;
    if (!pack) return; // ข้ามถ้าไม่ได้เลือกแพ็กจริง
    pack = parseInt(pack);

    let rate = r.children[1].querySelector("select").value;
    let data = preorderDiscount[pack];
    if (!data) return;

    let basePrice = data.base;
    let discountPrice = basePrice;
    if (rate==="3%") discountPrice = data["3%"];
    if (rate==="10%") discountPrice = data["10%"];
    if (rate==="ไม่ใช้ส่วนลด" && basePrice===null) return;

    results.push({ pack, base: basePrice, discount: discountPrice, topup: data.topup });
  });

  let totalBase = results.reduce((sum,r)=>sum+(r.base||0),0);
  let totalDiscount = results.reduce((sum,r)=>sum+(r.discount||0),0);
  let totalEchoes = results.reduce((sum,r)=>sum+r.pack,0);
  let totalTopup = results.reduce((sum,r)=>sum+r.topup,0);

  let html = "<table class='table table-bordered'><thead><tr><th>แพ็ก</th><th>ราคาปกติ</th><th>ราคาหลังส่วนลด</th><th>ยอดเติม</th></tr></thead><tbody>";
  results.forEach(r=>{
    html += `<tr>
      <td>${r.pack}</td>
      <td>${r.base!==null ? r.base : "-"}</td>
      <td>${r.discount}</td>
      <td>${r.topup}</td>
    </tr>`;
  });
  html += `<tr>
    <td>รวม</td>
    <td>${totalBase}</td>
    <td>${totalDiscount}</td>
    <td>${totalTopup}</td>
  </tr>`;
  html += "</tbody></table>";

  html += `<p>สูตรการเติมที่ใช้: ${results.map(r=>r.pack+"x1").join(", ")}</p>`;
  html += `<p>รวมทั้งหมด: ${totalEchoes} กระดุม</p>`;
  html += `<p>ราคารวม: ${totalDiscount} บาท</p>`;
  html += `<p>ยอดเติมเสียงสะท้อนรวม: ${totalTopup}</p>`;

  document.getElementById("result").innerHTML = html;
}

function showPage(page){

.filter(s => s.dataset.match !== "false");

let end = start + skinsPerPage;

skin.style.display="flex";
}

});

renderPageNumbers(totalPages);
}

function renderPageNumbers(totalPages){

let container = document.getElementById("pageNumbers");
container.innerHTML="";

for(let i=1;i<=totalPages;i++){

let btn=document.createElement("button");

btn.innerText=i;

if(i===currentPage){
btn.classList.add("active");
}

btn.onclick=()=>showPage(i);

container.appendChild(btn);

}

}

function changePage(step){
